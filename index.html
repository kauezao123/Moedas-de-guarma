<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 40px; 
        }
        h1 { text-align: center; margin-bottom: 30px; color: #fbbf24; }
        .container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 25px; 
            justify-content: center; 
        }
        .cartao { 
            border: 1px solid #334155; 
            border-radius: 16px; 
            padding: 20px; 
            width: 280px; 
            background: #1e293b;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .barra-fundo { 
            background: #0f172a; 
            height: 12px; 
            border-radius: 10px; 
            margin: 15px 0; 
        }
        .barra-progresso { 
            background: linear-gradient(90deg, #fbbf24, #f59e0b); 
            height: 100%; 
            border-radius: 10px; 
        }
        .info { display: flex; gap: 10px; margin-top: 15px; }
        .box { 
            background: #0f172a; 
            padding: 10px; 
            border-radius: 8px; 
            text-align: center; 
            flex: 1; 
            font-size: 13px; 
            border: 1px solid #334155;
        }
    </style>
</head>
<body>
    <h1>Painel de Controle</h1>
    <div class="container">
        <!-- Jogador 1 -->
        <div class="cartao">
            <h2>Nome Jogador | 001</h2>
            <div class="barra-fundo"><div class="barra-progresso" style="width: 70%;"></div></div>
            <p style="text-align: center; font-size: 14px;">1400 / 2000</p>
            <div class="info">
                <div class="box">US$ 500<br><small>Sujo</small></div>
                <div class="box">US$ 1200<br><small>Limpo</small></div>
            </div>
        </div>
    </div>
</body>
</html>
