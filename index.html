<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .cartao { border: 2px solid #fbbf24; border-radius: 12px; padding: 15px; margin-bottom: 15px; background: #1e293b; }
        .barra-fundo { background: #334155; width: 100%; height: 25px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .barra-progresso { background: #fbbf24; height: 100%; width: 50%; }
        .info { display: flex; gap: 10px; margin-top: 10px; }
        .box { background: #0f172a; padding: 10px; border-radius: 8px; text-align: center; flex: 1; font-size: 12px; }
    </style>
</head>
<body>
    <div class="cartao">
        <h2>Nome do Jogador | 0000</h2>
        <div class="barra-fundo">
            <div class="barra-progresso"></div>
        </div>
        <p>1000/2000 moedas (50%)</p>
        <div class="info">
            <div class="box">US$ 0,00<br>Dinheiro Sujo</div>
            <div class="box">US$ 0,00<br>Dinheiro Limpo</div>
        </div>
    </div>
</body>
</html>
